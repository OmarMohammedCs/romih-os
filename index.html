
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bin Romih OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #080808;
            color: #e5e5e5;
            font-family: 'Inter', 'IBM Plex Sans Arabic', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        [dir="rtl"] body {
            font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #222; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .deep-reveal { 
            animation: deepReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
            transform-origin: top;
        }
        @keyframes deepReveal {
            from { opacity: 0; transform: translateY(-8px) scaleY(0.98); }
            to { opacity: 1; transform: translateY(0) scaleY(1); }
        }

        .engine-entry-pulse {
            animation: entryPulse 150ms ease-out forwards;
        }
        @keyframes entryPulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .red-glow {
            filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.7));
        }
        
        .knurl-pattern {
            background-image: radial-gradient(#333 0.5px, transparent 0.5px);
            background-size: 2px 2px;
        }

        .locked-pattern {
            background-image: repeating-linear-gradient(45deg, rgba(20,20,20,0.5) 0, rgba(20,20,20,0.5) 2px, transparent 0, transparent 4px);
            background-size: 8px 8px;
        }

        .vignette {
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }
    </style>
